name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "master" ]

# 定义权限，确保 Action 有权将镜像写入仓库
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像名称格式必须为: ghcr.io/用户名/仓库名:标签
          # 建议转换为小写以避免命名空间冲突
          tags: |
            ghcr.io/${{ github.repository_owner }}/jupyter-vscode:latest
            ghcr.io/${{ github.repository_owner }}/jupyter-vscode:${{ github.sha }}
